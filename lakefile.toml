name = "ModalLogic"
defaultTargets = ["ModalLogic", "Axioms", "Examples"]

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "ModalLogic"
globs = ["ModalLogic", "ModalLogic.Syntax.+", "ModalLogic.Semantics.+", "ModalLogic.Metatheory.+", "ModalLogic.Cube"]

[[lean_lib]]
name = "Axioms"
globs = ["Axioms"]

[[lean_lib]]
name = "Examples"
globs = ["Examples"]
